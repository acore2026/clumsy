[server]
bind = 0.0.0.0
port = 7878

[scenario "drop_udp"]
filter = udp and outbound
drop = on
drop-inbound = off
drop-outbound = on
drop-chance = 25.0

[scenario "lag_tcp"]
filter = tcp and outbound
lag = on
lag-time = 200
lag-inbound = off
lag-outbound = on

[scenario "base"]
filter = udp and (ip.DstAddr == 192.168.1.153 or ip.SrcAddr == 192.168.1.153)
lag = on
lag-inbound = on
lag-outbound = on
lag-time-min = 3
lag-time-max = 6
drop = off
drop-inbound = on
drop-outbound = on
drop-chance = 0.0

[scenario "overload"]
filter = udp and (ip.DstAddr == 192.168.1.153 or ip.SrcAddr == 192.168.1.153)
lag = on
lag-inbound = on
lag-outbound = on
lag-time-min = 30
lag-time-max = 50
drop = on
drop-inbound = on
drop-outbound = on
drop-chance = 10.0

[scenario "all_controls_example"]
filter = tcp or udp
lag = on
lag-time = 120
lag-inbound = on
lag-outbound = on
drop = on
drop-chance = 5.0
drop-inbound = on
drop-outbound = off
throttle = on
throttle-drop = off
throttle-frame = 60
throttle-inbound = on
throttle-outbound = on
throttle-chance = 20.0
duplicate = on
duplicate-count = 3
duplicate-inbound = off
duplicate-outbound = on
duplicate-chance = 15.0
ood = on
ood-inbound = on
ood-outbound = on
ood-chance = 10.0
tamper = on
tamper-checksum = on
tamper-inbound = off
tamper-outbound = on
tamper-chance = 8.0
reset = on
reset-inbound = off
reset-outbound = on
reset-chance = 2.0
bandwidth = on
bandwidth-inbound = on
bandwidth-outbound = on
bandwidth-bandwidth = 256
