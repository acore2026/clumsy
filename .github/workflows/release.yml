name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-assets:
    name: Build release asset ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 toolchains
        id: setup-msys2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            mingw-w64-i686-gcc
            mingw-w64-i686-binutils

      - name: Add MinGW toolchains to PATH
        shell: pwsh
        run: |
          "${{ steps.setup-msys2.outputs.msys2-location }}\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${{ steps.setup-msys2.outputs.msys2-location }}\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${{ steps.setup-msys2.outputs.msys2-location }}\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build ship binary
        shell: pwsh
        run: .\build.ps1 -Arch ${{ matrix.arch }} -Configuration Ship -OutputRoot out -Clean

      - name: Package release ZIP
        shell: pwsh
        run: .\scripts\package-release.ps1 -BuildOutputDir out/ship-${{ matrix.arch }} -Version ${{ github.ref_name }} -Arch ${{ matrix.arch }} -DistRoot dist

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: dist/*.zip
          retention-days: 7
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-assets

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.zip --clobber
          else
            gh release create "$TAG_NAME" dist/*.zip --verify-tag --generate-notes
          fi
