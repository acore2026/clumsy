name: Build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 toolchains
        id: setup-msys2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            mingw-w64-i686-gcc
            mingw-w64-i686-binutils

      - name: Add MinGW toolchains to PATH
        shell: pwsh
        run: |
          "${{ steps.setup-msys2.outputs.msys2-location }}\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${{ steps.setup-msys2.outputs.msys2-location }}\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${{ steps.setup-msys2.outputs.msys2-location }}\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binary
        shell: pwsh
        run: .\build.ps1 -Arch ${{ matrix.arch }} -Configuration Release -OutputRoot out -Clean

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: clumsy-release-${{ matrix.arch }}
          path: out/release-${{ matrix.arch }}
          retention-days: 14
          if-no-files-found: error
